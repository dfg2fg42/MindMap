<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindSpark Pro</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e1018;--sur:#181b27;--sur2:#1f2336;--bdr:#2b3050;
  --txt:#e9ebf5;--mut:#7a82a8;--acc:#6c63ff;--neon:#39ff14;
  --sb:0px;--sb-open:230px;--mp:300px;--tb:52px;
}
body{font-family:'Segoe UI','Apple SD Gothic Neo',Arial,sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;user-select:none;}

/* ══ SIDEBAR (슬라이드) ══ */
#sidebar{
  position:fixed;left:0;top:0;bottom:0;width:var(--sb-open);z-index:90;
  background:var(--sur);border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(-230px);
  transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s;
  box-shadow:none;
}
#sidebar.sb-hover, #sidebar.pinned {
  transform:translateX(0);
  box-shadow:4px 0 32px rgba(0,0,0,.55);
}

/* 탭 핸들 (항상 보임) */
#sb-handle{
  position:absolute;right:-1px;top:50%;transform:translateY(-50%);
  width:18px;height:56px;background:var(--sur);border:1px solid var(--bdr);
  border-left:none;border-radius:0 8px 8px 0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:91;transition:background .13s;
  flex-direction:column;gap:3px;
}
#sb-handle:hover{background:var(--acc);}
#sb-handle span{width:3px;height:3px;border-radius:50%;background:var(--mut);display:block;transition:.13s;}
#sidebar:hover #sb-handle span,#sidebar.pinned #sb-handle span{background:#fff;}
#sb-head{padding:12px 12px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
#sb-label{font-size:.72rem;font-weight:800;color:var(--mut);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;}
#btn-new-cat{
  width:100%;background:var(--acc);color:#fff;border:none;border-radius:8px;
  padding:7px;font-size:.83rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:.13s;
}
#btn-new-cat:hover{background:#5651d8;}
#cat-list{flex:1;overflow-y:auto;padding:6px 6px;overflow-x:hidden;}
#cat-list::-webkit-scrollbar{width:3px;}
#cat-list::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}

/* ── tree rows ── */
.cat-row{
  display:flex;align-items:center;gap:3px;
  padding:6px 7px 6px 0;border-radius:8px;cursor:pointer;
  margin-bottom:2px;transition:.13s;
  border:1.5px solid transparent;position:relative;
}
.cat-row:hover{background:var(--sur2);}
.cat-row.active{background:rgba(108,99,255,.15);border-color:var(--acc);}
.cat-row.depth-1::before{content:'';position:absolute;left:20px;top:-2px;bottom:-2px;width:1px;background:var(--bdr);opacity:.5;}
.cat-row.depth-2::before{left:36px;}
.cat-row.depth-3::before{left:52px;}
/* drag */
.cat-row.dragging{opacity:.35;background:rgba(108,99,255,.08);}
.cat-row.drag-over-top{border-top:2.5px solid var(--acc)!important;}
.cat-row.drag-over-bottom{border-bottom:2.5px solid var(--acc)!important;}
.cat-row.drag-over-child{background:rgba(108,99,255,.22)!important;border-color:var(--acc)!important;}

.cat-toggle{width:20px;height:20px;flex-shrink:0;background:none;border:none;color:var(--mut);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:.68rem;transition:.13s;}
.cat-toggle:hover{background:var(--bdr);color:var(--txt);}
.cat-toggle.blank{cursor:default;pointer-events:none;}
.cat-icon-btn{width:26px;height:26px;flex-shrink:0;background:none;border:1px solid transparent;border-radius:7px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.13s;}
.cat-icon-btn:hover{background:var(--bdr);transform:scale(1.1);}
.cat-name-el{flex:1;font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);min-width:0;}
.cat-row.active .cat-name-el{color:var(--acc);}
.cat-name-inp{flex:1;background:var(--sur2);border:1.5px solid var(--acc);border-radius:6px;padding:2px 7px;font-size:.86rem;font-weight:600;color:var(--txt);outline:none;font-family:inherit;min-width:0;}
.cat-acts{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:.13s;}
.cat-row:hover .cat-acts{opacity:1;}
.cat-row.active .cat-acts{opacity:1;}
.cact{width:20px;height:20px;border-radius:5px;cursor:pointer;font-size:.7rem;background:none;border:none;color:var(--mut);display:flex;align-items:center;justify-content:center;transition:.13s;}
.cact:hover{background:var(--sur2);color:var(--txt);}
.cact.del:hover{color:#ff6b6b;background:rgba(255,80,80,.13);}
.cat-count-badge{font-size:.68rem;color:var(--mut);background:var(--sur2);border-radius:99px;padding:1px 6px;flex-shrink:0;}

/* ══ ICON PICKER ══ */
#icon-picker{position:fixed;z-index:500;display:none;background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:10px;box-shadow:0 12px 40px rgba(0,0,0,.65);width:236px;}
#ip-title{font-size:.75rem;color:var(--mut);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
#ip-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;}
.ip-btn{width:100%;aspect-ratio:1;background:var(--sur2);border:1.5px solid transparent;border-radius:8px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:.13s;}
.ip-btn:hover{border-color:var(--acc);background:rgba(108,99,255,.15);transform:scale(1.08);}

/* ══ TOOLBAR ══ */
#toolbar{
  position:fixed;top:0;left:var(--sb);right:0;height:var(--tb);z-index:80;
  background:var(--sur);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:6px;padding:0 12px;
  box-shadow:0 2px 14px rgba(0,0,0,.4);
  transition:left .22s cubic-bezier(.4,0,.2,1);
}
.logo{font-size:1.1rem;font-weight:900;color:var(--acc);margin-right:2px;}
.logo b{color:var(--txt);font-weight:900;}
.tbtn{background:var(--sur2);border:1.5px solid var(--bdr);color:var(--txt);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:.79rem;white-space:nowrap;transition:.13s;display:flex;align-items:center;gap:4px;}
.tbtn:hover{border-color:var(--acc);color:var(--acc);}
.tbtn.prim{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700;}
.tbtn.prim:hover{background:#5651d8;color:#fff;}
.tbtn.danger:hover{border-color:#ff5f6d;color:#ff5f6d;}
.sep{width:1px;height:26px;background:var(--bdr);margin:0 1px;flex-shrink:0;}
.cur-chip{background:rgba(108,99,255,.15);border:1px solid var(--acc);border-radius:8px;padding:4px 10px;font-size:.81rem;font-weight:700;color:var(--acc);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.tinfo{font-size:.74rem;color:var(--mut);margin-left:auto;white-space:nowrap;}
.tinfo b{color:var(--txt);}

/* ══ VIEWPORT ══ */
#viewport{position:fixed;top:var(--tb);left:var(--sb);right:0;bottom:0;overflow:hidden;cursor:grab;transition:right .25s ease,left .22s cubic-bezier(.4,0,.2,1);}
#viewport.memo-open{right:var(--mp);}
#viewport.panning{cursor:grabbing;}
#viewport.moving{cursor:move;}
#svg-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;}
#world{position:absolute;left:0;top:0;transform-origin:0 0;z-index:2;}

/* ══ NODES ══ */
.node{position:absolute;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;min-width:82px;max-width:196px;padding:0 16px;font-size:.88rem;font-weight:700;text-align:center;white-space:nowrap;border:2.5px solid transparent;transition:box-shadow .15s,border-color .15s;}
.node:hover{filter:brightness(1.1);}
.node.root-node{font-size:1rem;font-weight:900;border-radius:14px;}
@keyframes selPulse{0%,100%{box-shadow:0 0 0 2px rgba(57,255,20,.4),0 0 14px 4px rgba(57,255,20,.45),0 5px 20px rgba(0,0,0,.45);}50%{box-shadow:0 0 0 2px rgba(57,255,20,.6),0 0 22px 8px rgba(57,255,20,.65),0 5px 20px rgba(0,0,0,.45);}}
.node.selected{border-color:var(--neon)!important;animation:selPulse 1.4s ease-in-out infinite;}
@keyframes starGlow{0%,100%{box-shadow:0 0 0 2.5px #ffd700,0 0 10px 3px rgba(255,215,0,.55),0 4px 18px rgba(0,0,0,.4);}50%{box-shadow:0 0 0 2.5px #ffe566,0 0 22px 8px rgba(255,215,0,.85),0 4px 18px rgba(0,0,0,.4);}}
.node.starred{border-color:#ffd700!important;animation:starGlow 1.8s ease-in-out infinite;}
.node.starred.selected{border-color:var(--neon)!important;animation:selPulse 1.4s ease-in-out infinite;}
.node-label{pointer-events:none;}
.node-edit{background:transparent;border:none;outline:none;font-family:inherit;font-weight:inherit;font-size:inherit;color:inherit;text-align:center;width:100%;min-width:30px;}
.star-badge{position:absolute;top:-9px;right:-9px;font-size:.75rem;pointer-events:none;filter:drop-shadow(0 0 4px rgba(255,215,0,.9));}
.memo-dot{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:#38b2ff;border:2px solid var(--bg);pointer-events:none;box-shadow:0 0 6px rgba(56,178,255,.7);}

/* ══ MEMO TOOLTIP ══ */
#memo-tooltip{position:fixed;z-index:400;background:var(--sur);border:1.5px solid #38b2ff;border-radius:10px;padding:10px 13px;max-width:260px;min-width:120px;box-shadow:0 8px 28px rgba(0,0,0,.6),0 0 12px rgba(56,178,255,.2);pointer-events:none;display:none;font-size:.81rem;line-height:1.65;color:var(--txt);}
#memo-tooltip .mtt-title{font-size:.7rem;font-weight:800;color:#38b2ff;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
#memo-tooltip .mtt-body{white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:hidden;color:var(--txt);opacity:.9;}
#memo-tooltip .mtt-img-preview{margin-top:7px;display:flex;gap:4px;flex-wrap:wrap;}
#memo-tooltip .mtt-img-preview img{width:48px;height:48px;object-fit:cover;border-radius:5px;border:1px solid var(--bdr);}

/* ══ FLOATING PANEL ══ */
#node-panel{position:fixed;z-index:150;background:var(--sur);border:1px solid var(--bdr);border-radius:99px;padding:5px 10px;display:none;align-items:center;gap:7px;box-shadow:0 6px 24px rgba(0,0,0,.55);}
.npbtn{background:none;border:1.5px solid var(--bdr);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:.14s;flex-shrink:0;color:var(--txt);}
.npbtn:hover{border-color:var(--acc);color:var(--acc);}
#np-star.on{border-color:#ffd700;background:rgba(255,215,0,.18);}
#np-memo.on{border-color:#38b2ff;background:rgba(56,178,255,.15);color:#38b2ff;}
.np-sep{width:1px;height:22px;background:var(--bdr);}
#np-colors{display:flex;gap:5px;align-items:center;}
.npc{width:21px;height:21px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2.5px solid transparent;transition:.13s;}
.npc:hover{transform:scale(1.2);}
.npc.on{border-color:#fff;transform:scale(1.18);}
.npc-rst{width:21px;height:21px;border-radius:50%;cursor:pointer;flex-shrink:0;background:var(--sur2);border:1.5px solid var(--bdr);color:var(--txt);font-size:.7rem;font-weight:900;display:flex;align-items:center;justify-content:center;transition:.13s;}
.npc-rst:hover{border-color:var(--acc);}

/* ══ MEMO PANEL ══ */
#memo-panel{position:fixed;top:var(--tb);right:0;bottom:0;width:var(--mp);z-index:70;background:var(--sur);border-left:1px solid var(--bdr);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;}
#memo-panel.open{transform:translateX(0);}
#memo-head{padding:11px 13px 9px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-shrink:0;}
#memo-node-name{flex:1;font-size:.9rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#memo-close-btn{background:none;border:1.5px solid var(--bdr);border-radius:7px;padding:3px 8px;cursor:pointer;color:var(--mut);font-size:.78rem;transition:.13s;}
#memo-close-btn:hover{border-color:#ff6b6b;color:#ff6b6b;}
#memo-body{flex:1;display:flex;flex-direction:column;padding:12px;overflow:hidden;}
#memo-lbl{font-size:.73rem;color:var(--mut);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px;}
#memo-ta{flex:1;background:var(--sur2);border:1.5px solid var(--bdr);border-radius:10px;color:var(--txt);font-family:inherit;font-size:.88rem;padding:12px;resize:none;outline:none;line-height:1.7;transition:border .14s;min-height:80px;max-height:200px;}
#memo-ta:focus{border-color:var(--acc);}
#memo-ta::placeholder{color:var(--mut);}
#memo-saved{font-size:.72rem;color:var(--mut);margin-top:5px;text-align:right;}
/* 이미지 첨부 영역 */
#memo-img-section{margin-top:10px;flex-shrink:0;}
#memo-img-lbl{font-size:.73rem;color:var(--mut);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
#memo-img-add{background:var(--sur2);border:1.5px dashed var(--bdr);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:.79rem;color:var(--mut);text-align:center;transition:.13s;display:flex;align-items:center;justify-content:center;gap:6px;}
#memo-img-add:hover{border-color:var(--acc);color:var(--acc);}
#memo-img-input{display:none;}
#memo-img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.memo-img-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1.5px solid var(--bdr);cursor:pointer;transition:.13s;}
.memo-img-thumb:hover{border-color:var(--acc);}
.memo-img-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.memo-img-thumb .img-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#ff6b6b;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:.13s;}
.memo-img-thumb:hover .img-del{opacity:1;}
/* 이미지 라이트박스 */
#img-lightbox{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;cursor:zoom-out;}
#img-lightbox img{max-width:90vw;max-height:90vh;border-radius:10px;box-shadow:0 0 60px rgba(0,0,0,.8);}
#lb-close{position:fixed;top:18px;right:22px;font-size:1.5rem;color:#fff;cursor:pointer;opacity:.7;transition:.13s;}
#lb-close:hover{opacity:1;}

/* ══ CTX MENU ══ */
#ctx{position:fixed;z-index:300;display:none;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:5px 0;min-width:156px;box-shadow:0 8px 32px rgba(0,0,0,.55);}
.ctx-row{padding:8px 16px;cursor:pointer;font-size:.83rem;display:flex;align-items:center;gap:8px;transition:background .12s;}
.ctx-row:hover{background:var(--sur2);}
.ctx-row.red{color:#ff6b6b;}
.ctx-row.red:hover{background:rgba(255,80,80,.1);}

/* ══ MISC ══ */
#zoom-badge{position:fixed;bottom:16px;left:calc(var(--sb) + 12px);z-index:60;background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:4px 10px;font-size:.75rem;color:var(--mut);transition:left .22s;}
#zoom-badge b{color:var(--txt);}
#minimap{position:fixed;bottom:16px;right:16px;z-index:60;width:155px;height:105px;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;opacity:.88;transition:right .25s ease;}
#minimap.mo{right:calc(var(--mp) + 14px);}
#mm{display:block;width:100%;height:100%;}
#hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--sur2);border:1px solid var(--bdr);padding:6px 15px;border-radius:99px;font-size:.73rem;color:var(--mut);pointer-events:none;transition:opacity .5s;white-space:nowrap;z-index:60;}

/* ══ BACKUP MODAL ══ */
#backup-modal{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;}
#backup-modal.open{display:flex;}
#backup-box{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:24px;width:380px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.65);}
#backup-box h2{font-size:1rem;font-weight:800;color:var(--txt);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.bk-btn{width:100%;background:var(--sur2);border:1.5px solid var(--bdr);color:var(--txt);border-radius:10px;padding:12px 16px;cursor:pointer;font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:10px;transition:.13s;text-align:left;}
.bk-btn:hover{border-color:var(--acc);color:var(--acc);}
.bk-btn .bk-icon{font-size:1.3rem;}
.bk-btn .bk-desc{font-size:.74rem;color:var(--mut);font-weight:500;margin-top:2px;}
.bk-btn:hover .bk-desc{color:var(--acc);opacity:.7;}
#backup-close{background:none;border:1.5px solid var(--bdr);border-radius:8px;padding:6px 16px;color:var(--mut);cursor:pointer;font-size:.82rem;transition:.13s;margin-top:4px;width:100%;}
#backup-close:hover{border-color:#ff6b6b;color:#ff6b6b;}
#restore-input{display:none;}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(10px);
  background:#23263a;border:1px solid var(--bdr);border-radius:99px;
  padding:8px 20px;font-size:.83rem;color:var(--txt);
  box-shadow:0 6px 24px rgba(0,0,0,.55);
  opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;z-index:700;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ DIR MENU ══ */
.dir-opt{padding:8px 16px;cursor:pointer;font-size:.83rem;color:var(--txt);transition:background .12s;display:flex;align-items:center;gap:6px;}
.dir-opt:hover{background:var(--sur2);}
.dir-opt.active{color:var(--acc);font-weight:700;}
#btn-dir.on{border-color:var(--acc);color:var(--acc);}
</style>
</head>
<body>

<!-- SIDEBAR (슬라이드) -->
<div id="sidebar">
  <div id="sb-handle" title="사이드바 고정/해제" onclick="toggleSbPin()">
    <span></span><span></span><span></span>
  </div>
  <div id="sb-head">
    <div id="sb-label">📁 카테고리</div>
    <button id="btn-new-cat">＋ 새 카테고리</button>
  </div>
  <div id="cat-list"></div>
</div>

<!-- ICON PICKER -->
<div id="icon-picker">
  <div id="ip-title">아이콘 선택</div>
  <div id="ip-grid"></div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="logo">🧠Mind<b>Spark</b></div>
  <div id="cur-chip" class="cur-chip"><span id="cur-icon">🗂</span><span id="cur-name">기본</span></div>
  <div class="sep"></div>
  <button class="tbtn prim" id="btn-child">＋ 자식 <span style="opacity:.6;font-size:.72rem">(Tab)</span></button>
  <div id="dir-wrap" style="position:relative;display:inline-flex;">
    <button class="tbtn" id="btn-dir" title="자식 노드 생성 방향 선택" style="padding:5px 8px;gap:3px;">
      <span id="dir-icon">⇄</span><span id="dir-label" style="font-size:.75rem;">자동</span><span style="font-size:.6rem;opacity:.6;">▼</span>
    </button>
    <div id="dir-menu" style="display:none;position:absolute;top:100%;left:0;margin-top:4px;
      background:var(--sur);border:1.5px solid var(--bdr);border-radius:10px;
      padding:4px 0;min-width:130px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:200;">
      <div class="dir-opt" data-val="auto"  data-icon="⇄" data-lbl="자동">⇄ &nbsp;자동 (좌우 균형)</div>
      <div class="dir-opt" data-val="right" data-icon="→" data-lbl="오른쪽">→ &nbsp;오른쪽</div>
      <div class="dir-opt" data-val="left"  data-icon="←" data-lbl="왼쪽">← &nbsp;왼쪽</div>
    </div>
  </div>

<script>
/* ════════════════ ICONS ════════════════ */
var ICONS=['🗂','📁','📂','💡','🔥','⚡','🎯','🚀','💎','🌟','✨','🎨','🧠','💻','📱','🎮','🏆','🔑','🌈','🎭','🧩','🔬','🌱','💪','🎵','📚','🔧','⚙️','🏃','📊','✍️','🧪','🎲','⭐','🔮','🌸','🏠','🌍','❤️','🦁','🐉','🍀'];
var BCOLORS=['#7c6fcd','#e8567a','#1a9e6b','#d9873d','#2878c5','#b84fa3','#3aaa5a','#c0392b','#16a085','#c7a417'];
var PALETTE=[{v:'#7c6fcd',n:'보라'},{v:'#e8567a',n:'핑크'},{v:'#1a9e6b',n:'초록'},{v:'#d9873d',n:'주황'},{v:'#2878c5',n:'파랑'},{v:'#b84fa3',n:'마젠타'},{v:'#3aaa5a',n:'연초록'},{v:'#c0392b',n:'빨강'},{v:'#16a085',n:'청록'},{v:'#c7a417',n:'황금'},{v:'#555e85',n:'슬레이트'},{v:'#e05c97',n:'로즈'}];
var HGAP=210,VGAP=50,NH=40,RH=50;

/* ════════════════ STATE ════════════════ */
var cats=[];
var curCatId=1;
var nextCatId=1;
var nodes=[],nid=1;
var cam={x:0,y:0,z:1};
var sel=null,panSt=null,movSt=null;
var undoStack=[];
var childDir='auto'; // 'auto','right','left'
var memoOpen=false,isLight=false;
var iconPickerTarget=null;
var sbPinned=false;

/* ════════════════ HELPERS ════════════════ */
function gn(id){for(var i=0;i<nodes.length;i++)if(nodes[i].id===id)return nodes[i];return null;}
function gr(){for(var i=0;i<nodes.length;i++)if(nodes[i].pid===null)return nodes[i];return null;}
function gc(id){return nodes.filter(function(n){return n.pid===id;});}
function nw(t){return Math.max(84,Math.min(196,((t||'').length*10)+30));}
function getCat(id){for(var i=0;i<cats.length;i++)if(cats[i].id===id)return cats[i];return null;}
function catChildren(pid){return cats.filter(function(c){return c.parentId===pid;});}
function getColor(id){
  var n=gn(id);if(!n)return BCOLORS[0];
  if(n.customColor)return n.customColor;
  if(n.pid===null)return '#5a52d5';
  var cur=n;
  while(true){var p=gn(cur.pid);if(!p||p.pid===null)break;cur=p;}
  var root=gr();
  var l1=nodes.filter(function(x){return x.pid===root.id;});
  var idx=-1;for(var i=0;i<l1.length;i++)if(l1[i].id===cur.id){idx=i;break;}
  if(idx<0)idx=0;
  return BCOLORS[((idx%BCOLORS.length)+BCOLORS.length)%BCOLORS.length];
}

/* ════════════════ SIDEBAR SLIDE ════════════════ */
function toggleSbPin(){
  sbPinned=!sbPinned;
  var sb=document.getElementById('sidebar');
  sb.classList.toggle('pinned',sbPinned);
  if(sbPinned){
    sb.classList.add('sb-hover');
  } else {
    sb.classList.remove('sb-hover');
  }
  document.getElementById('sb-handle').title=sbPinned?'📌 고정 해제':'사이드바 고정';
}

/* ════════════════ SAVE / LOAD ════════════════ */
function saveAll(){
  var cc=getCat(curCatId);
  if(cc){cc.nodes=nodes;cc.nid=nid;cc.cam=cam;}
  try{localStorage.setItem('msp2',JSON.stringify({cats:cats,curCatId:curCatId,nextCatId:nextCatId}));}catch(e){}
}
function loadAll(){
  try{
    var d=localStorage.getItem('msp2');
    if(d){var o=JSON.parse(d);cats=o.cats||[];curCatId=o.curCatId||1;nextCatId=o.nextCatId||1;}
  }catch(e){}
  if(!cats.length){
    cats=[{id:nextCatId++,name:'기본',icon:'🗂',parentId:null,collapsed:false,
      nodes:[{id:1,text:'중심 주제',x:0,y:0,pid:null,star:false,customColor:null,memo:'',imgs:[]}],nid:2,cam:{x:0,y:0,z:1}}];
    curCatId=cats[0].id;
  }
  cats.forEach(function(c){
    if(!c.icon)c.icon='🗂';
    if(c.collapsed===undefined)c.collapsed=false;
    if(!c.parentId&&c.parentId!==null)c.parentId=null;
    c.nodes.forEach(function(n){
      if(n.star===undefined)n.star=false;
      if(n.customColor===undefined)n.customColor=null;
      if(n.memo===undefined)n.memo='';
      if(n.imgs===undefined)n.imgs=[];
    });
  });
  var cc=getCat(curCatId);
  if(!cc){curCatId=cats[0].id;cc=cats[0];}
  nodes=cc.nodes;nid=cc.nid;cam=cc.cam||{x:0,y:0,z:1};
}

/* ════════════════ LOAD CATEGORY ════════════════ */
function loadCat(id,doFit){
  var old=getCat(curCatId);
  if(old){old.nodes=nodes;old.nid=nid;old.cam=cam;}
  curCatId=id;
  var cc=getCat(id);
  nodes=cc.nodes;nid=cc.nid;cam=cc.cam||{x:0,y:0,z:1};
  sel=null;closeMemo();
  applyCamera();renderAll();
  if(doFit)setTimeout(fitView,80);
  updateToolbarChip();
  buildCatTree();
}
function updateToolbarChip(){
  var cc=getCat(curCatId);if(!cc)return;
  document.getElementById('cur-icon').textContent=cc.icon||'🗂';
  document.getElementById('cur-name').textContent=cc.name;
}

/* ════════════════ CATEGORY CRUD ════════════════ */
function newCat(parentId){
  if(parentId===undefined)parentId=null;
  var par=parentId?getCat(parentId):null;
  if(par&&par.collapsed){par.collapsed=false;}
  var name='카테고리 '+nextCatId;
  var newC={id:nextCatId++,name:name,icon:'🗂',parentId:parentId,collapsed:false,
    nodes:[{id:1,text:'중심 주제',x:0,y:0,pid:null,star:false,customColor:null,memo:'',imgs:[]}],nid:2,cam:{x:0,y:0,z:1}};
  cats.push(newC);
  loadCat(newC.id,true);saveAll();
  setTimeout(function(){
    var rows=document.querySelectorAll('.cat-row[data-id="'+newC.id+'"]');
    if(rows.length){startCatRename(newC.id,rows[0].querySelector('.cat-name-el'));}
  },100);
}
function deleteCat(catId){
  if(cats.length<=1){alert('마지막 카테고리는 삭제할 수 없습니다.');return;}
  var desc=[];
  function collect(id){desc.push(id);catChildren(id).forEach(function(c){collect(c.id);});}
  collect(catId);
  var cat=getCat(catId);
  var msg=desc.length>1?'"'+cat.name+'" 및 하위 '+(desc.length-1)+'개 카테고리를 삭제할까요?':'"'+cat.name+'" 카테고리를 삭제할까요?';
  if(!confirm(msg))return;
  cats=cats.filter(function(c){return desc.indexOf(c.id)<0;});
  if(desc.indexOf(curCatId)>=0){
    curCatId=cats[0].id;var cc=cats[0];
    nodes=cc.nodes;nid=cc.nid;cam=cc.cam||{x:0,y:0,z:1};
    sel=null;closeMemo();applyCamera();renderAll();updateToolbarChip();
  }
  saveAll();buildCatTree();
}
function startCatRename(catId,nameEl){
  var inp=document.createElement('input');
  inp.className='cat-name-inp';inp.value=getCat(catId).name;
  nameEl.replaceWith(inp);inp.focus();inp.select();
  function done(){
    var v=inp.value.trim()||getCat(catId).name;
    getCat(catId).name=v;
    var nl=document.createElement('span');nl.className='cat-name-el';nl.textContent=v;
    inp.replaceWith(nl);
    if(catId===curCatId)updateToolbarChip();
    saveAll();buildCatTree();
  }
  inp.onblur=done;
  inp.onkeydown=function(e){
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){inp.value=getCat(catId).name;inp.blur();}
    e.stopPropagation();
  };
}

/* ════════════════ ICON PICKER ════════════════ */
function openIconPicker(catId,btnEl){
  closeIconPicker();iconPickerTarget=catId;
  var picker=document.getElementById('icon-picker');
  var rect=btnEl.getBoundingClientRect();
  var left=rect.right+6;if(left+240>window.innerWidth)left=rect.left-244;
  picker.style.left=Math.max(4,left)+'px';picker.style.top=Math.max(60,rect.top-10)+'px';
  picker.style.display='block';
}
function closeIconPicker(){document.getElementById('icon-picker').style.display='none';iconPickerTarget=null;}

/* ════════════════ CATEGORY DRAG & DROP ════════════════ */
var dragCatId=null,dragOverId=null,dragPos=null;
function clearDragHighlights(){
  document.querySelectorAll('.cat-row').forEach(function(r){
    r.classList.remove('drag-over-top','drag-over-bottom','drag-over-child','dragging');
  });
}
function isDescendant(ancestorId,childId){
  var c=getCat(childId);
  while(c&&c.parentId!==null){if(c.parentId===ancestorId)return true;c=getCat(c.parentId);}
  return false;
}
function moveCatTo(srcId,targetId,pos){
  if(srcId===targetId)return;
  if(isDescendant(srcId,targetId))return;
  var src=getCat(srcId),target=getCat(targetId);
  if(pos==='child'){
    if(src.parentId===targetId)return;
    src.parentId=targetId;target.collapsed=false;
  } else {
    src.parentId=target.parentId;
    var srcIdx=cats.findIndex(function(c){return c.id===srcId;});
    cats.splice(srcIdx,1);
    var targetIdx=cats.findIndex(function(c){return c.id===targetId;});
    if(pos==='bottom')targetIdx++;
    cats.splice(targetIdx,0,src);
  }
  saveAll();buildCatTree();updateToolbarChip();
}

/* ════════════════ BUILD TREE ════════════════ */
function buildCatTree(){
  var list=document.getElementById('cat-list');list.innerHTML='';
  renderTree(null,0,list);
}
function renderTree(parentId,depth,container){
  catChildren(parentId).forEach(function(cat){
    var hasKids=catChildren(cat.id).length>0;
    var row=document.createElement('div');
    row.className='cat-row'+(cat.id===curCatId?' active':'')+(depth>0?' depth-'+depth:'');
    row.dataset.id=cat.id;row.style.paddingLeft=(8+depth*18)+'px';
    row.setAttribute('draggable','true');

    var tog=document.createElement('button');
    tog.className='cat-toggle'+(hasKids?'':' blank');
    tog.textContent=hasKids?(cat.collapsed?'▶':'▼'):'';
    if(hasKids){(function(c){tog.onclick=function(e){e.stopPropagation();c.collapsed=!c.collapsed;saveAll();buildCatTree();};})(cat);}

    var iconBtn=document.createElement('button');
    iconBtn.className='cat-icon-btn';iconBtn.textContent=cat.icon||'🗂';iconBtn.title='아이콘 변경';
    (function(c,btn){btn.onclick=function(e){e.stopPropagation();openIconPicker(c.id,btn);};})(cat,iconBtn);

    var dragHint=document.createElement('span');
    dragHint.style.cssText='font-size:.65rem;color:var(--mut);opacity:0;transition:.13s;flex-shrink:0;cursor:grab;padding:0 2px;';
    dragHint.textContent='⠿';dragHint.title='드래그하여 이동';
    row.addEventListener('mouseenter',function(){dragHint.style.opacity='1';});
    row.addEventListener('mouseleave',function(){dragHint.style.opacity='0';});

    var nameEl=document.createElement('span');nameEl.className='cat-name-el';nameEl.textContent=cat.name;
    var badge=document.createElement('span');badge.className='cat-count-badge';
    badge.textContent=(cat.id===curCatId?nodes:cat.nodes).length;

    var acts=document.createElement('div');acts.className='cat-acts';
    var addBtn=document.createElement('button');addBtn.className='cact';addBtn.textContent='＋';addBtn.title='하위 카테고리 추가';
    (function(id){addBtn.onclick=function(e){e.stopPropagation();newCat(id);};})(cat.id);
    var delBtn=document.createElement('button');delBtn.className='cact del';delBtn.textContent='✕';delBtn.title='삭제';
    (function(id){delBtn.onclick=function(e){e.stopPropagation();deleteCat(id);};})(cat.id);
    acts.appendChild(addBtn);acts.appendChild(delBtn);

    row.appendChild(tog);row.appendChild(dragHint);row.appendChild(iconBtn);row.appendChild(nameEl);
    row.appendChild(badge);row.appendChild(acts);

    (function(id){
      row.onclick=function(e){if(e.target===delBtn||e.target===addBtn||e.target===iconBtn||e.target===tog)return;if(id!==curCatId){loadCat(id,true);saveAll();}};
      row.ondblclick=function(e){e.stopPropagation();startCatRename(id,nameEl);};
      row.addEventListener('dragstart',function(e){dragCatId=id;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);});
      row.addEventListener('dragend',function(){clearDragHighlights();dragCatId=null;dragOverId=null;dragPos=null;});
      row.addEventListener('dragover',function(e){
        e.preventDefault();if(!dragCatId||dragCatId===id)return;if(isDescendant(dragCatId,id))return;
        clearDragHighlights();
        var rect=row.getBoundingClientRect(),y=e.clientY-rect.top,zone=rect.height*0.28;
        dragOverId=id;
        if(y<zone){dragPos='top';row.classList.add('drag-over-top');}
        else if(y>rect.height-zone){dragPos='bottom';row.classList.add('drag-over-bottom');}
        else{dragPos='child';row.classList.add('drag-over-child');}
        e.dataTransfer.dropEffect='move';
      });
      row.addEventListener('dragleave',function(){row.classList.remove('drag-over-top','drag-over-bottom','drag-over-child');});
      row.addEventListener('drop',function(e){
        e.preventDefault();if(!dragCatId||dragCatId===id)return;
        moveCatTo(dragCatId,id,dragPos);clearDragHighlights();dragCatId=null;dragOverId=null;dragPos=null;
      });
    })(cat.id);

    container.appendChild(row);
    if(!cat.collapsed&&hasKids)renderTree(cat.id,depth+1,container);
  });
}

/* ════════════════ CAMERA ════════════════ */
function applyCamera(){
  document.getElementById('world').style.transform='translate('+cam.x+'px,'+cam.y+'px) scale('+cam.z+')';
  document.getElementById('zval').textContent=Math.round(cam.z*100);
}
function w2s(wx,wy){return{x:wx*cam.z+cam.x,y:wy*cam.z+cam.y};}
function s2w(sx,sy){
  var vp=document.getElementById('viewport').getBoundingClientRect();
  return{x:(sx-vp.left-cam.x)/cam.z,y:(sy-vp.top-cam.y)/cam.z};
}

/* ════════════════ LAYOUT ════════════════ */
function subH(id){var k=gc(id);if(!k.length)return NH+VGAP;var t=0;for(var i=0;i<k.length;i++)t+=subH(k[i].id);return t;}
function layoutBranch(kids,par,dir){
  if(!kids.length)return;
  var total=0;for(var i=0;i<kids.length;i++)total+=subH(kids[i].id);
  var y=par.y-total/2;
  for(var i=0;i<kids.length;i++){
    var h=subH(kids[i].id);kids[i].x=par.x+dir*HGAP;kids[i].y=y+h/2;y+=h;
    var g=gc(kids[i].id);if(g.length)layoutBranch(g,kids[i],dir);
  }
}
function autoLayout(){
  var root=gr();if(!root)return;
  root.x=0;root.y=0;
  var k=gc(root.id);
  if(childDir==='right'){
    /* 모두 오른쪽 */
    layoutBranch(k,root,1);
  } else if(childDir==='left'){
    /* 모두 왼쪽 */
    layoutBranch(k,root,-1);
  } else {
    /* 자동: 좌우 균형 분배 */
    var half=Math.ceil(k.length/2);
    layoutBranch(k.slice(0,half),root,1);
    layoutBranch(k.slice(half),root,-1);
  }
  renderAll();saveAll();
}

/* ════════════════ RENDER CURVES ════════════════ */
function renderCurves(){
  var svg=document.getElementById('svg-layer');
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  for(var i=0;i<nodes.length;i++){
    var c=nodes[i];if(c.pid===null)continue;
    var p=gn(c.pid);if(!p)continue;
    var color=getColor(c.id);
    var pw=nw(p.text)+(p.pid===null?16:0),cw=nw(c.text);
    var pwx,pwy,cwx,cwy;
    if(c.x>=p.x){pwx=p.x+pw/2;cwx=c.x-cw/2;}else{pwx=p.x-pw/2;cwx=c.x+cw/2;}
    pwy=p.y;cwy=c.y;
    var ps=w2s(pwx,pwy),cs=w2s(cwx,cwy),mx=(ps.x+cs.x)/2;
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M'+ps.x+','+ps.y+' C'+mx+','+ps.y+' '+mx+','+cs.y+' '+cs.x+','+cs.y);
    path.setAttribute('fill','none');path.setAttribute('stroke',color);
    path.setAttribute('stroke-width',(p.pid===null)?'3':'2');
    path.setAttribute('stroke-linecap','round');path.setAttribute('opacity','0.9');
    svg.appendChild(path);
  }
}

/* ════════════════ RENDER NODES ════════════════ */
function renderNodes(){
  var world=document.getElementById('world');
  var ex={};var els=world.querySelectorAll('.node');
  for(var i=0;i<els.length;i++)ex[els[i].dataset.id]=els[i];
  var alive={};for(var i=0;i<nodes.length;i++)alive[nodes[i].id]=true;
  for(var k in ex)if(!alive[k])world.removeChild(ex[k]);
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];var el=ex[String(n.id)];
    if(!el){
      el=document.createElement('div');
      el.className='node'+(n.pid===null?' root-node':'');
      el.dataset.id=n.id;
      var lbl=document.createElement('span');lbl.className='node-label';el.appendChild(lbl);
      world.appendChild(el);bindNode(el,n.id);
    }
    var w=nw(n.text)+(n.pid===null?16:0),h=n.pid===null?RH:NH;
    el.style.left=(n.x-w/2)+'px';el.style.top=(n.y-h/2)+'px';
    el.style.width=w+'px';el.style.height=h+'px';
    el.style.background=getColor(n.id);el.style.color='#fff';
    el.classList.toggle('selected',sel===n.id);el.classList.toggle('starred',!!n.star);
    var sb=el.querySelector('.star-badge');
    if(n.star){if(!sb){sb=document.createElement('span');sb.className='star-badge';el.appendChild(sb);}sb.textContent='⭐';}
    else{if(sb)el.removeChild(sb);}
    var md=el.querySelector('.memo-dot');
    if((n.memo&&n.memo.trim())||(n.imgs&&n.imgs.length)){if(!md){md=document.createElement('span');md.className='memo-dot';el.appendChild(md);}}
    else{if(md)el.removeChild(md);}
    var lbl2=el.querySelector('.node-label');if(lbl2)lbl2.textContent=n.text;
  }
}

/* 이미지 첨부 처리 */
function handleImgFiles(files){
  var ta=document.getElementById('memo-ta');
  var id2=parseInt(ta.dataset.nid);if(!id2)return;
  var n=gn(id2);if(!n)return;
  if(!n.imgs)n.imgs=[];

  Array.from(files).forEach(function(file){
    if(!file.type.startsWith('image/'))return;

      n.imgs.push(e.target.result);
      remaining--;
      if(remaining<=0){saveAll();renderMemoImgs(n);renderNodes();}
    };
    reader.readAsDataURL(file);
  });
}

/* ════════════════ ADD/DELETE ════════════════ */
function addChild(pid){
  var par=gn(pid);if(!par)return;
  var dir;
  if(childDir==='right') dir=1;
  else if(childDir==='left') dir=-1;
  else dir=(par.pid===null?1:(par.x>=gr().x?1:-1));
  var newN={id:nid++,text:'새 아이디어',x:par.x,y:par.y,pid:pid,star:false,customColor:null,memo:'',imgs:[]}; /* X는 layoutSiblings에서 설정 */
  nodes.push(newN);sel=newN.id;
  /* 기존 노드 위치 유지 — 부모의 형제 그룹만 Y축 재정렬 */
  layoutSiblings(pid, dir);
  renderAll();saveAll();
  setTimeout(function(){startEdit(newN.id);},80);
}

/* 새 노드 추가 시 Y축만 균등 재배치 — 기존 노드 X위치 절대 변경 안 함 */
function layoutSiblings(pid, dir){
  var par=gn(pid);if(!par)return;
  var kids=gc(pid);if(!kids.length)return;
  /* 새로 추가된 노드(X=0인 노드)만 X 위치 지정 */
  for(var i=0;i<kids.length;i++){
    if(kids[i].x===par.x){ kids[i].x=par.x+dir*HGAP; }
  }
  /* Y축만 균등 재배치 */
  var total=0;for(var i=0;i<kids.length;i++)total+=subH(kids[i].id);
  var y=par.y-total/2;
  for(var i=0;i<kids.length;i++){
    var h=subH(kids[i].id);
    kids[i].y=y+h/2;
    y+=h;
    /* 손자 이하도 Y축만 재배치 */
    var grandKids=gc(kids[i].id);
    if(grandKids.length){
      var subDir=kids[i].x>=par.x?1:-1;
      layoutSiblingsDeep(kids[i].id, subDir);
    }
  }
}
function layoutSiblingsDeep(pid, dir){
  var par=gn(pid);if(!par)return;
  var kids=gc(pid);if(!kids.length)return;
  var total=0;for(var i=0;i<kids.length;i++)total+=subH(kids[i].id);
  var y=par.y-total/2;
  for(var i=0;i<kids.length;i++){
    var h=subH(kids[i].id);
    /* X는 기존 위치 유지, Y만 재배치 */
    if(kids[i].x===par.x) kids[i].x=par.x+dir*HGAP;
    kids[i].y=y+h/2;
    y+=h;
    layoutSiblingsDeep(kids[i].id, dir);
  }
}
function addSibling(id){var n=gn(id);if(!n||n.pid===null)return;addChild(n.pid);}
function delNode(id){
  var n=gn(id);if(!n||n.pid===null)return;
  var del=[];function collect(x){del.push(x);gc(x).forEach(function(c){collect(c.id);});}
  collect(id);
  var delCount=del.length;
  var msg=delCount>1?'"'+n.text+'" 및 하위 '+(delCount-1)+'개 노드를 삭제할까요?':'"'+n.text+'" 노드를 삭제할까요?';
  if(!confirm('🗑 '+msg))return;
  /* undo 스택에 현재 상태 저장 */
  undoStack.push({nodes:JSON.parse(JSON.stringify(nodes)),nid:nid,sel:sel});
  if(undoStack.length>30)undoStack.shift();
  nodes=nodes.filter(function(n){return del.indexOf(n.id)<0;});
  if(del.indexOf(sel)>=0){sel=null;if(memoOpen)closeMemo();}
  autoLayout();
}
function undoDelete(){
  if(!undoStack.length){showToast('↩ 되돌릴 내용이 없습니다');return;}
  var prev=undoStack.pop();
  nodes=prev.nodes;nid=prev.nid;sel=prev.sel;
  saveAll();renderAll();
  showToast('↩ 삭제가 복구되었습니다');
}
function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.classList.remove('show');},2200);
}
function toggleStar(id){var n=gn(id);if(!n)return;n.star=!n.star;saveAll();renderAll();}

/* ════════════════ BIND NODE ════════════════ */
function bindNode(el,id){
  el.addEventListener('mousedown',function(e){
    if(e.button!==0)return;e.stopPropagation();
    if(el.querySelector('.node-edit'))return;
    hideMemoTooltip();sel=id;
    var wp=s2w(e.clientX,e.clientY),n=gn(id);
    movSt={id:id,ox:n.x,oy:n.y,mx:wp.x,my:wp.y};

    if(memoOpen){saveMemoTxt();document.getElementById('memo-node-name').textContent=n.text;document.getElementById('memo-ta').value=n.memo||'';document.getElementById('memo-ta').dataset.nid=id;renderMemoImgs(n);}
    renderAll();
  });
  el.addEventListener('mouseenter',function(e){
    var n=gn(id);
    if(n&&((n.memo&&n.memo.trim())||(n.imgs&&n.imgs.length))){showMemoTooltip(id,e.clientX,e.clientY);}
  });
  el.addEventListener('mousemove',function(e){
    if(!movSt){
      var tt=document.getElementById('memo-tooltip');
      if(tt.style.display==='block'){
        var tx=e.clientX+16,ty=e.clientY-10;
        if(tx+270>window.innerWidth)tx=e.clientX-276;
        if(ty+220>window.innerHeight)ty=window.innerHeight-230;
        tt.style.left=Math.max(4,tx)+'px';tt.style.top=Math.max(4,ty)+'px';
      }
    }
  });
  el.addEventListener('mouseleave',function(){hideMemoTooltip();});
  el.addEventListener('dblclick',function(e){e.stopPropagation();startEdit(id);});
  el.addEventListener('contextmenu',function(e){e.preventDefault();e.stopPropagation();sel=id;renderAll();showCtx(e.clientX,e.clientY,id);});
}

/* ════════════════ ZOOM / FIT ════════════════ */
function zoomAt(sx,sy,up){
  var vp=document.getElementById('viewport').getBoundingClientRect();
  var rx=sx-vp.left,ry=sy-vp.top,f=up?1.13:0.885;
  var nz=Math.max(0.15,Math.min(3.5,cam.z*f));
  cam.x=rx-(rx-cam.x)*nz/cam.z;cam.y=ry-(ry-cam.y)*nz/cam.z;cam.z=nz;
  applyCamera();renderCurves();updatePanel();drawMM();
}
function fitView(){
  if(!nodes.length)return;
  var mx=Infinity,my=Infinity,xx=-Infinity,xy=-Infinity;
  nodes.forEach(function(n){var w=nw(n.text)+(n.pid===null?16:0);mx=Math.min(mx,n.x-w/2-30);my=Math.min(my,n.y-NH/2-30);xx=Math.max(xx,n.x+w/2+30);xy=Math.max(xy,n.y+NH/2+30);});
  var vp=document.getElementById('viewport');var vw=vp.clientWidth,vh=vp.clientHeight;
  var tw=xx-mx,th=xy-my;var z=Math.min(3,Math.max(0.15,Math.min(vw/tw,vh/th)*0.88));
  cam.z=z;cam.x=(vw-tw*z)/2-mx*z;cam.y=(vh-th*z)/2-my*z;
  applyCamera();renderCurves();updatePanel();drawMM();
}

/* ════════════════ MINIMAP ════════════════ */
function drawMM(){
  var cv=document.getElementById('mm'),ctx=cv.getContext('2d');
  cv.width=155;cv.height=105;ctx.clearRect(0,0,155,105);
  if(!nodes.length)return;
  var mx=Infinity,my=Infinity,xx=-Infinity,xy=-Infinity;
  nodes.forEach(function(n){mx=Math.min(mx,n.x-60);my=Math.min(my,n.y-20);xx=Math.max(xx,n.x+60);xy=Math.max(xy,n.y+20);});
  var tw=Math.max(1,xx-mx),th=Math.max(1,xy-my);
  var s=Math.min(138/tw,88/th),ox=8-mx*s+(138-tw*s)/2,oy=8-my*s+(88-th*s)/2;
  nodes.forEach(function(c){
    if(c.pid===null)return;var p=gn(c.pid);if(!p)return;
    ctx.beginPath();var px2=p.x*s+ox,py2=p.y*s+oy,cx2=c.x*s+ox,cy2=c.y*s+oy;
    ctx.moveTo(px2,py2);ctx.bezierCurveTo((px2+cx2)/2,py2,(px2+cx2)/2,cy2,cx2,cy2);
    ctx.strokeStyle=getColor(c.id);ctx.lineWidth=1.2;ctx.stroke();
  });
  nodes.forEach(function(n){
    var x=n.x*s+ox,y=n.y*s+oy,w=Math.max(8,nw(n.text)*s),h=5;
    ctx.beginPath();ctx.roundRect(x-w/2,y-h/2,w,h,2);ctx.fillStyle=getColor(n.id);ctx.fill();
    if(n.star){ctx.fillStyle='#ffd700';ctx.font='7px serif';ctx.fillText('★',x+w/2-3,y-h/2-1);}
    if((n.memo&&n.memo.trim())||(n.imgs&&n.imgs.length)){ctx.fillStyle='#38b2ff';ctx.beginPath();ctx.arc(x,y+h/2+3,2.5,0,Math.PI*2);ctx.fill();}
  });
  var vp=document.getElementById('viewport');var vw=vp.clientWidth,vh=vp.clientHeight;
  var rx=(-cam.x/cam.z)*s+ox,ry=(-cam.y/cam.z)*s+oy,rw=(vw/cam.z)*s,rh=(vh/cam.z)*s;
  ctx.strokeStyle='rgba(108,99,255,.7)';ctx.lineWidth=1.5;ctx.strokeRect(rx,ry,rw,rh);
}

/* ════════════════ BACKUP & RESTORE ════════════════ */
function openBackupModal(){document.getElementById('backup-modal').classList.add('open');}

function importJSON(){

}

document.getElementById('restore-input').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var o=JSON.parse(ev.target.result);
      if(!o.cats||!Array.isArray(o.cats))throw new Error('올바른 MindSpark 백업 파일이 아닙니다.');
      if(!confirm('현재 데이터가 모두 교체됩니다. 불러올까요?'))return;
      cats=o.cats;curCatId=o.curCatId||o.cats[0].id;nextCatId=o.nextCatId||99;
      cats.forEach(function(c){
        if(!c.icon)c.icon='🗂';if(c.collapsed===undefined)c.collapsed=false;
        c.nodes.forEach(function(n){
          if(n.star===undefined)n.star=false;if(n.customColor===undefined)n.customColor=null;
          if(n.memo===undefined)n.memo='';if(n.imgs===undefined)n.imgs=[];
        });
      });
      var cc=getCat(curCatId);if(!cc){curCatId=cats[0].id;cc=cats[0];}
      nodes=cc.nodes;nid=cc.nid;cam=cc.cam||{x:0,y:0,z:1};
      sel=null;closeMemo();saveAll();applyCamera();renderAll();fitView();updateToolbarChip();
      closeBackupModal();
      alert('✅ 백업을 성공적으로 불러왔습니다!');
    }catch(err){alert('❌ 파일 오류: '+err.message);}
  };
  reader.readAsText(file);
});

function exportHTML(){
  var cc=getCat(curCatId);if(cc){cc.nodes=nodes;cc.nid=nid;cc.cam=cam;}
  var data=JSON.stringify({cats:cats,curCatId:curCatId,nextCatId:nextCatId});
  // 현재 페이지 HTML에 데이터 삽입
  var src=document.documentElement.outerHTML;
  // 인라인 초기 데이터 주입
  var injected=src.replace('/* __EMBEDDED_DATA__ */',
    'var __ED__='+data+';try{if(__ED__){cats=__ED__.cats;curCatId=__ED__.curCatId;nextCatId=__ED__.nextCatId;}}catch(e){}');
  var blob=new Blob([injected],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='mindspark_'+new Date().toISOString().slice(0,10)+'.html';
  a.click();URL.revokeObjectURL(a.href);
  closeBackupModal();
}

/* ════════════════ LIGHT THEME ════════════════ */
function toggleTheme(){
  isLight=!isLight;
  var r=document.documentElement;
  r.style.setProperty('--bg',isLight?'#f0f2fa':'#0e1018');r.style.setProperty('--sur',isLight?'#ffffff':'#181b27');
  r.style.setProperty('--sur2',isLight?'#e8ebf5':'#1f2336');r.style.setProperty('--bdr',isLight?'#c8cde0':'#2b3050');
  r.style.setProperty('--txt',isLight?'#1a1d2e':'#e9ebf5');r.style.setProperty('--mut',isLight?'#6b7494':'#7a82a8');
  document.getElementById('btn-theme').textContent=isLight?'🌙 다크':'☀️ 라이트';
}

/* ════════════════ EVENTS ════════════════ */
document.getElementById('viewport').addEventListener('mousedown',function(e){
  if(e.button!==0)return;hideCtx();closeIconPicker();
  panSt={sx:e.clientX,sy:e.clientY,cx:cam.x,cy:cam.y};this.classList.add('panning');
});
document.addEventListener('mousemove',function(e){
  if(movSt){
    var wp=s2w(e.clientX,e.clientY),n=gn(movSt.id);
    if(n){n.x=movSt.ox+(wp.x-movSt.mx);n.y=movSt.oy+(wp.y-movSt.my);}
    renderAll();return;
  }
  if(panSt){cam.x=panSt.cx+(e.clientX-panSt.sx);cam.y=panSt.cy+(e.clientY-panSt.sy);applyCamera();renderCurves();updatePanel();drawMM();}
});
document.addEventListener('mouseup',function(){
  if(movSt){movSt=null;document.getElementById('viewport').classList.remove('moving');saveAll();}
  if(panSt){panSt=null;document.getElementById('viewport').classList.remove('panning');}
});
document.getElementById('viewport').addEventListener('wheel',function(e){e.preventDefault();zoomAt(e.clientX,e.clientY,e.deltaY<0);},{passive:false});
document.addEventListener('click',function(e){
  hideCtx();closeIconPicker();
  if(!document.getElementById('memo-tooltip').contains(e.target))hideMemoTooltip();
});
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='Tab'){e.preventDefault();if(sel)addChild(sel);}
  else if(e.key==='Enter'){if(sel)addSibling(sel);}
  else if(e.key==='Delete'||e.key==='Backspace'){if(sel)delNode(sel);}
  else if((e.ctrlKey||e.metaKey)&&(e.key==='z'||e.key==='Z')){e.preventDefault();undoDelete();}
  else if(e.key==='s'||e.key==='S'){if(sel)toggleStar(sel);}
  else if(e.key==='m'||e.key==='M'){if(sel){if(memoOpen)closeMemo();else openMemo(sel);}}
  else if(e.key==='Escape'){sel=null;renderAll();if(memoOpen)closeMemo();}
  else if(e.key==='F2'){if(sel)startEdit(sel);}
});
